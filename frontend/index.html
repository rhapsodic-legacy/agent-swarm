<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drone Swarm Coordinator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #e0e0e0;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
      }
      #hud {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 200, 255, 0.3);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        pointer-events: none;
        backdrop-filter: blur(8px);
      }
      #hud h2 {
        font-size: 14px;
        color: #00c8ff;
        margin-bottom: 8px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      #hud .stat {
        margin: 4px 0;
        color: #b0b0b0;
      }
      #hud .stat span {
        color: #fff;
        font-weight: 600;
      }
      #connection-status {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        backdrop-filter: blur(8px);
      }
      #connection-status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff4444;
      }
      #connection-status.connected .dot {
        background: #44ff44;
      }
      #controls {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 200;
        pointer-events: auto;
      }
      #controls button {
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 200, 255, 0.3);
        color: #e0e0e0;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.15s, border-color 0.15s;
      }
      #controls button:hover {
        background: rgba(0, 200, 255, 0.15);
        border-color: rgba(0, 200, 255, 0.6);
      }
      #controls button.accent {
        border-color: rgba(255, 160, 0, 0.5);
      }
      #controls button.accent:hover {
        background: rgba(255, 160, 0, 0.15);
        border-color: rgba(255, 160, 0, 0.8);
      }
      #controls .hint {
        color: #666;
        font-size: 11px;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <h2>Swarm Status</h2>
        <div class="stat">Drones: <span id="drone-count">0</span></div>
        <div class="stat">Survivors: <span id="survivor-count">0</span></div>
        <div class="stat">Coverage: <span id="coverage-pct">0%</span></div>
        <div class="stat">Elapsed: <span id="elapsed-time">0:00</span></div>
        <div class="stat">Phase: <span id="agent-phase" style="color:#00c8ff">--</span></div>
        <div class="stat">AI Calls: <span id="ai-calls" style="color:#aaa">0 / 0</span></div>
        <div class="stat">Wind: <span id="wind-info" style="color:#aaa">--</span></div>
        <div class="stat">Time: <span id="daytime-info" style="color:#aaa">--</span></div>
        <div id="briefing" style="margin-top:8px;font-size:11px;color:#88cc88;max-width:220px;line-height:1.4;display:none"></div>
      </div>
      <div id="connection-status">
        <div class="dot"></div>
        <span>Disconnected</span>
      </div>
      <div id="controls">
        <button id="btn-pause">Pause</button>
        <button id="btn-speed1">1x</button>
        <button id="btn-speed2">2x</button>
        <button id="btn-speed5">5x</button>
        <button id="btn-reset" class="accent">Reset</button>
        <span class="hint">WASD=pan  G=god  H=heatmap  ?=help</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
